<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>DoctorBike Italia - SOS Meccanico</title>
    <meta name="theme-color" content="#00847d" />
    <meta name="color-scheme" content="light" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="DoctorBike" />
    <base href="/" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon.svg" />

    <!-- DNS prefetch + preconnect for all external services -->
    <link rel="preconnect" href="https://firestore.googleapis.com" />
    <link rel="preconnect" href="https://identitytoolkit.googleapis.com" />
    <link rel="preconnect" href="https://securetoken.googleapis.com" />
    <link rel="preconnect" href="https://europe-west1-doctorbike-v2.cloudfunctions.net" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://mt1.google.com" />
    <link rel="dns-prefetch" href="https://basemaps.cartocdn.com" />
    <link rel="dns-prefetch" href="https://storage.googleapis.com" />
    <link rel="dns-prefetch" href="https://www.googleapis.com" />
  </head>
  <body style="background-color: var(--app-viewport-bg, #020f0e);">
    <script>
      (function () {
        var m = window.matchMedia('(display-mode: standalone)');
        if (m.matches || navigator.standalone) {
          document.documentElement.classList.add('pwa-standalone');
        }
      })();
    </script>
    <div id="root">
      <!-- Initial Splash Screen -->
      <div id="initial-loader" style="position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background-color: #020f0e; z-index: 9999; font-family: sans-serif;">
        <div style="width: 60px; height: 60px; border: 5px solid #f3f3f3; border-top: 5px solid #00847d; border-radius: 50%; animation: spin 1s linear infinite;"></div>
        <p style="margin-top: 20px; font-weight: 900; color: #00847d; text-transform: uppercase; letter-spacing: 2px; font-style: italic;">DoctorBike</p>
        <p style="margin-top: 8px; font-size: 10px; color: #64748b; font-weight: bold;">Avvio assistenza...</p>
        <style>
          @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        </style>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
